name: "kunnus"
description: "Generate an SBOM and upload it to the Kunnus platform"
inputs:
  scan-args:
    description: "Arguments to kunnus, separated by new line"
    default: |-
      sbom
      ./
  api-key:
    description: "Kunnus API key for uploading SBOMs (mapped to KUNNUS_API_KEY)"
    required: false
  component-id:
    description: "Component ID to associate the SBOM with (mapped to KUNNUS_COMPONENT_ID)"
    required: false
  upload-url:
    description: "Kunnus upload API URL override (mapped to KUNNUS_URL)"
    required: false
runs:
  using: "docker"
  image: "docker://ghcr.io/think-ahead-technologies/kunnus-scanner-action:latest"
  env:
    KUNNUS_API_KEY: ${{ inputs.api-key }}
    KUNNUS_COMPONENT_ID: ${{ inputs.component-id }}
    KUNNUS_URL: ${{ inputs.upload-url }}
  args:
    - ${{ inputs.scan-args }}
