version: 2

before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/kunnus/
    id: kunnus
    binary: kunnus
    env:
      # goreleaser does not work with CGO, it could also complicate
      # usage by users in CI/CD systems like Terraform Cloud where
      # they are unable to install libraries.
      - CGO_ENABLED=0
      - GO111MODULE=on
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w"
      - "-X github.com/google/osv-scanner/v2/cmd/kunnus/internal/version.KunnusVersion={{.Version}}"
      - "-X main.commit={{.Commit}}"
      - "-X main.date={{.CommitDate}}"
    goos:
      # Further testing before supporting freebsd
      # - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      # 32bit does not compile at the moment because of spdx dependency
      # - '386'
      # Further testing before supporting arm
      # - arm
      - arm64

dockers_v2:
  # Main kunnus image (linux/amd64 + linux/arm64 multi-arch manifest)
  - id: kunnus
    dockerfile: goreleaser.dockerfile
    ids:
      - kunnus
    images:
      - "ghcr.io/think-ahead-technologies/kunnus-scanner"
    tags:
      - "{{ .Tag }}"
      - "latest"
      - '{{ if eq .Env.STABLE "true" }}stable{{ end }}'
    labels:
      "org.opencontainers.image.title": "kunnus"
      "org.opencontainers.image.description": "Vulnerability scanner written in Go which uses the data provided by https://osv.dev"
      "org.opencontainers.image.licenses": "Apache License 2.0"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.url": "{{.GitURL}}"
    platforms:
      - linux/amd64
      - linux/arm64
  # GitHub Actions variant (linux/amd64 only, with exit_code_redirect.sh)
  - id: kunnus-action
    dockerfile: goreleaser-action.dockerfile
    ids:
      - kunnus
    images:
      - "ghcr.io/think-ahead-technologies/kunnus-scanner-action"
    tags:
      - "{{ .Tag }}"
    labels:
      "org.opencontainers.image.title": "kunnus-action"
      "org.opencontainers.image.description": "Vulnerability scanner written in Go which uses the data provided by https://osv.dev"
      "org.opencontainers.image.licenses": "Apache-2.0"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.url": "{{.GitURL}}"
    extra_files:
      - exit_code_redirect.sh
    platforms:
      - linux/amd64

brews:
  - name: kunnus
    ids:
      - kunnus
    repository:
      owner: think-ahead-technologies
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/think-ahead-technologies/kunnus-scanner"
    description: "Vulnerability scanner for your software dependencies"
    license: "Apache-2.0"
    install: |
      bin.install "kunnus"
    test: |
      system "#{bin}/kunnus", "--version"

scoops:
  - name: kunnus
    ids:
      - kunnus
    repository:
      owner: think-ahead-technologies
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/think-ahead-technologies/kunnus-scanner"
    description: "Vulnerability scanner for your software dependencies"
    license: "Apache-2.0"

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"

archives:
  - formats: binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - kunnus
checksum:
  name_template: "{{ .ProjectName }}_SHA256SUMS"
  algorithm: sha256
release:
  draft: true
changelog:
  disable: false
